name: DevSecOps Automated Pipeline

on:
  push:
    branches: [ "main" ]

# Grant permissions to allow GitHub Actions to build and push container images to GHCR
permissions:
  contents: read
  packages: write

jobs:
  security-scans:
    name: Run DevSecOps Security Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Trivy Container Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        hide-progress: false
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    - name: Run Gitleaks Secret Detection Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: detect --verbose --redact

  build-and-deploy:
    name: Build Image and Deploy to Cloud
    needs: security-scans
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔄 FIX: Create the lowercase repository path cleanly using standard step outputs
    - name: Prepare Lowercase Image Tag Target
      id: string
      run: |
        IMAGE_PATH="ghcr.io/${{ github.repository_owner }}/employee-portal:latest"
        echo "tag=$(echo "$IMAGE_PATH" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 🚀 FIX: Pass the explicit step output value directly into the tags field
    - name: Build and Push Secure Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.string.outputs.tag }} # Reads the validated lowercase string perfectly!

    # Step 3: SSH Remote Deployment to AWS Cloud Server
    - name: SSH Remote Deployment to AWS Cloud Server
      uses: appleboy/ssh-action@master
      with:
        host: "13.220.232.101" # Your running AWS EC2 Public IP address
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo apt-get update -y
          sudo apt-get install -y docker.io
          
          # Log into the GitHub registry from inside your remote cloud instance
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          
          # Clean out old running test subjects to release web tracking port 5000
          sudo docker stop employee-portal-prod || true
          sudo docker rm employee-portal-prod || true
          
          # Pull down the verified, passing image version and launch it live!
          sudo docker pull ghcr.io/haohao99/employee-portal:latest
          sudo docker run -d -p 5000:5000 --name employee-portal-prod --restart unless-stopped ghcr.io/haohao99/employee-portal:latest