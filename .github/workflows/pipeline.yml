name: DevSecOps Automated Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scans:
    name: Run DevSecOps Security Checks
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download repository files
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Gitleaks needs full history to scan for leaked secrets properly

    # Step 2: Run Trivy to scan the container layout configuration
    - name: Run Trivy Container Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        hide-progress: false
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    # =======================================================================
    # 🚨 NEW GUARD: Gitleaks Secret Scanner
    # This step will scan main.py, find your hardcoded fake key, and fail!
    # =======================================================================
    - name: Run Gitleaks Secret Detection Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: detect --verbose --redact
